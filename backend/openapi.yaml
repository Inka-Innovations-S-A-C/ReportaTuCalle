openapi: 3.0.0
info:
  title: Reporta Tu Calle API
  description: |
    API REST para gestionar reportes ciudadanos de problemas en la calle.
    Sistema sin base de datos, datos en memoria.
    
    ## Características
    - Gestión de usuarios (ciudadanos, supervisores, administradores)
    - Sistema de autenticación token-based
    - CRUD completo de reportes
    - Gestión de categorías
    - Cambio de estado y prioridad de reportes
    
    ## Tipos de Usuarios
    - **ciudadano**: Puede crear reportes, ver categorías
    - **supervisor**: Incluye teléfono, puede gestionar reportes
    - **admin**: Acceso completo
    
    ## Autenticación
    Los endpoints protegidos requieren un header `Authorization` con formato: `token-provisional-valido-{userId}`
    
  version: 1.0.0
  contact:
    name: API Support
    email: support@reportatucalle.com
  license:
    name: MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Servidor de desarrollo
  - url: https://api.reportatucalle.com/api/v1
    description: Servidor de producción

tags:
  - name: Usuarios
    description: Gestión de usuarios y autenticación
  - name: Reportes
    description: Gestión de reportes ciudadanos
  - name: Categorías
    description: Categorías de reportes

paths:
  /usuarios/register:
    post:
      tags:
        - Usuarios
      summary: Registrar nuevo usuario
      description: |
        Registra un nuevo usuario en el sistema.
        - **Ciudadano**: Solo requiere email, password, nombre y tipo
        - **Supervisor**: Requiere además el campo teléfono (obligatorio)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioRequest'
            examples:
              ciudadano:
                summary: Registro como ciudadano
                value:
                  email: juan@test.com
                  password: "Password123!"
                  nombre: Juan Pérez
                  tipo: ciudadano
              supervisor:
                summary: Registro como supervisor
                value:
                  email: supervisor@test.com
                  password: "Password123!"
                  nombre: García López
                  tipo: supervisor
                  telefono: "+573001234567"
      responses:
        '201':
          description: Usuario registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
        '400':
          description: |
            Solicitud inválida. Posibles razones:
            - Email no válido
            - Password no cumple requisitos
            - Teléfono requerido para supervisores
            - Email ya existe
        '500':
          description: Error interno del servidor

  /usuarios/login:
    post:
      tags:
        - Usuarios
      summary: Iniciar sesión
      description: Autentica un usuario y retorna un token de acceso
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: juan@test.com
                password:
                  type: string
                  format: password
                  example: "Password123!"
              required:
                - email
                - password
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: "token-provisional-valido-1"
        '401':
          description: Credenciales inválidas o usuario no existe
        '500':
          description: Error interno del servidor

  /usuarios/{id}:
    get:
      tags:
        - Usuarios
      summary: Obtener usuario por ID
      description: Recupera la información de un usuario específico
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: ID del usuario
          example: 1
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
        '404':
          description: Usuario no encontrado
        '500':
          description: Error interno del servidor

  /usuarios:
    get:
      tags:
        - Usuarios
      summary: Listar todos los usuarios
      description: Obtiene la lista completa de usuarios registrados en el sistema
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsuarioResponse'
        '500':
          description: Error interno del servidor

  /reportes:
    post:
      tags:
        - Reportes
      summary: Crear nuevo reporte
      description: |
        Crea un nuevo reporte ciudadano.
        **Requiere autenticación**: Header `Authorization` con token válido
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReporteRequest'
            example:
              titulo: "Bache en Carrera 7"
              descripcion: "Existe un bache profundo que daña los vehículos"
              latitud: 4.7110
              longitud: -74.0075
              categoriaId: 1
              usuarioEmail: "juan@test.com"
      responses:
        '201':
          description: Reporte creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReporteResponse'
        '400':
          description: |
            Datos inválidos:
            - Campos requeridos faltantes
            - Categoría no existe
            - Coordenadas inválidas
        '401':
          description: Token inválido o no proporcionado
        '500':
          description: Error interno del servidor

    get:
      tags:
        - Reportes
      summary: Listar todos los reportes
      description: |
        Obtiene la lista de todos los reportes del sistema.
        **Requiere autenticación**: Header `Authorization` con token válido
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Lista de reportes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReporteResponse'
        '401':
          description: Token inválido o no proporcionado
        '500':
          description: Error interno del servidor

  /reportes/{id}:
    get:
      tags:
        - Reportes
      summary: Obtener reporte por ID
      description: |
        Recupera los detalles de un reporte específico.
        **Requiere autenticación**: Header `Authorization` con token válido
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: ID del reporte
          example: 1
      responses:
        '200':
          description: Reporte encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReporteResponse'
        '401':
          description: Token inválido o no proporcionado
        '404':
          description: Reporte no encontrado
        '500':
          description: Error interno del servidor

    delete:
      tags:
        - Reportes
      summary: Eliminar reporte
      description: |
        Elimina un reporte del sistema.
        **Requiere autenticación**: Header `Authorization` con token válido
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: ID del reporte a eliminar
          example: 1
      responses:
        '204':
          description: Reporte eliminado exitosamente
        '401':
          description: Token inválido o no proporcionado
        '404':
          description: Reporte no encontrado
        '500':
          description: Error interno del servidor

  /reportes/{id}/estado:
    patch:
      tags:
        - Reportes
      summary: Cambiar estado del reporte
      description: |
        Cambia el estado de un reporte.
        Estados válidos: `nuevo`, `revisado`, `asignado`, `en_proceso`, `resuelto`, `cerrado`
        **Requiere autenticación**: Header `Authorization` con token válido
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: ID del reporte
          example: 1
        - in: query
          name: estado
          required: true
          schema:
            type: string
            enum:
              - nuevo
              - revisado
              - asignado
              - en_proceso
              - resuelto
              - cerrado
          description: Nuevo estado del reporte
          example: en_proceso
      responses:
        '200':
          description: Estado actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReporteResponse'
        '400':
          description: Estado inválido
        '401':
          description: Token inválido o no proporcionado
        '404':
          description: Reporte no encontrado
        '500':
          description: Error interno del servidor

  /categorias:
    get:
      tags:
        - Categorías
      summary: Listar todas las categorías
      description: Obtiene la lista de todas las categorías disponibles para reportes
      responses:
        '200':
          description: Lista de categorías
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoriaResponse'
        '500':
          description: Error interno del servidor

  /categorias/{id}:
    get:
      tags:
        - Categorías
      summary: Obtener categoría por ID
      description: Recupera los detalles de una categoría específica
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
          description: ID de la categoría
          example: 1
      responses:
        '200':
          description: Categoría encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoriaResponse'
        '404':
          description: Categoría no encontrada
        '500':
          description: Error interno del servidor

components:
  schemas:
    UsuarioRequest:
      type: object
      description: Datos requeridos para registrar un usuario
      required:
        - email
        - password
        - nombre
        - tipo
      properties:
        email:
          type: string
          format: email
          description: Email único del usuario
          example: juan@test.com
        password:
          type: string
          format: password
          description: |
            Contraseña (mínimo 8 caracteres, debe contener mayúscula, minúscula y número)
          example: "Password123!"
        nombre:
          type: string
          description: Nombre completo del usuario
          example: Juan Pérez García
        tipo:
          type: string
          enum:
            - ciudadano
            - supervisor
            - admin
          description: Tipo de usuario
          example: ciudadano
        telefono:
          type: string
          description: |
            Teléfono del usuario.
            **Obligatorio** para tipo supervisor.
            Opcional para ciudadanos
          example: "+573001234567"

    UsuarioResponse:
      type: object
      description: Información de un usuario registrado
      properties:
        id:
          type: integer
          format: int64
          description: ID único del usuario
          example: 1
        email:
          type: string
          format: email
          description: Email del usuario
          example: juan@test.com
        nombre:
          type: string
          description: Nombre completo del usuario
          example: Juan Pérez García
        tipo:
          type: string
          enum:
            - ciudadano
            - supervisor
            - admin
          description: Tipo de usuario
          example: ciudadano
        telefono:
          type: string
          nullable: true
          description: Teléfono del usuario (puede ser nulo)
          example: "+573001234567"
        fechaRegistro:
          type: string
          format: date-time
          description: Fecha y hora de registro
          example: "2024-04-28T10:30:00"

    ReporteRequest:
      type: object
      description: Datos requeridos para crear un reporte
      required:
        - titulo
        - descripcion
        - latitud
        - longitud
        - categoriaId
      properties:
        titulo:
          type: string
          description: Título del reporte
          example: "Bache en Carrera 7"
        descripcion:
          type: string
          description: Descripción detallada del problema
          example: "Existe un bache profundo que daña los vehículos"
        latitud:
          type: number
          format: double
          description: Latitud de la ubicación (WGS84)
          example: 4.7110
        longitud:
          type: number
          format: double
          description: Longitud de la ubicación (WGS84)
          example: -74.0075
        categoriaId:
          type: integer
          format: int64
          description: ID de la categoría del reporte
          example: 1
        usuarioEmail:
          type: string
          format: email
          nullable: true
          description: Email del usuario que crea el reporte (opcional)
          example: juan@test.com

    ReporteResponse:
      type: object
      description: Información de un reporte
      properties:
        id:
          type: integer
          format: int64
          description: ID único del reporte
          example: 1
        titulo:
          type: string
          description: Título del reporte
          example: "Bache en Carrera 7"
        descripcion:
          type: string
          description: Descripción del problema
          example: "Existe un bache profundo que daña los vehículos"
        latitud:
          type: number
          format: double
          description: Latitud de la ubicación
          example: 4.7110
        longitud:
          type: number
          format: double
          description: Longitud de la ubicación
          example: -74.0075
        categoriaId:
          type: integer
          format: int64
          description: ID de la categoría
          example: 1
        estado:
          type: string
          enum:
            - nuevo
            - revisado
            - asignado
            - en_proceso
            - resuelto
            - cerrado
          description: Estado actual del reporte
          example: nuevo
        prioridad:
          type: string
          enum:
            - baja
            - media
            - alta
            - critica
          description: Nivel de prioridad del reporte
          example: media
        fechaCreacion:
          type: string
          format: date-time
          description: Fecha y hora de creación
          example: "2024-04-28T10:30:00"
        usuarioId:
          type: integer
          format: int64
          nullable: true
          description: ID del usuario que creó el reporte
          example: 1

    CategoriaResponse:
      type: object
      description: Información de una categoría de reportes
      properties:
        id:
          type: integer
          format: int64
          description: ID único de la categoría
          example: 1
        nombre:
          type: string
          description: Nombre de la categoría
          example: "Infraestructura Vial"
        descripcion:
          type: string
          description: Descripción de la categoría
          example: "Problemas relacionados con calles y carreteras"
        icono:
          type: string
          description: Nombre o referencia del icono
          example: "road"
        color:
          type: string
          description: Color hexadecimal asociado
          example: "#FF5733"

  securitySchemes:
    BearerAuth:
      type: apiKey
      in: header
      name: Authorization
      description: |
        Token de autenticación.
        Formato: `token-provisional-valido-{userId}`
        Ejemplo: `token-provisional-valido-1`

externalDocs:
  description: Repositorio del proyecto
  url: https://github.com/tu-usuario/reporta-tu-calle-api
